<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Sayfa Bulunamadı | kursatca.com</title>
  <link rel="stylesheet" href="css/style.css?v=1.0.3" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❓</text></svg>" />
  <style>
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      position: relative;
      z-index: 1;
    }
    .error-card {
      max-width: 500px;
      width: 100%;
      text-align: center;
      padding: var(--space-2xl) var(--space-xl);
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      animation: reveal-up 0.8s var(--ease-out-expo);
    }
    @keyframes reveal-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .error-code {
      display: block;
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: var(--space-md);
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.8;
    }
    .error-title {
      font-size: var(--fs-h2);
      margin-bottom: var(--space-sm);
      color: var(--clr-text-primary);
    }
    .error-desc {
      color: var(--clr-text-secondary);
      margin-bottom: var(--space-xl);
      line-height: 1.8;
      font-size: 1.1rem;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
      color: white;
      border-radius: var(--radius-pill);
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
      transition: all 0.3s ease;
    }
    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(124, 58, 237, 0.4);
      color: white;
    }
    .error-visual-elements {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
    }
    .orb-1 { width: 300px; height: 300px; background: var(--clr-primary); top: 10%; left: 10%; }
    .orb-2 { width: 250px; height: 250px; background: var(--clr-secondary); bottom: 10%; right: 10%; }
  </style>
  <link rel="canonical" href="https://kursatca.com/404.html" />
</head>
<body>
  <div class="error-visual-elements">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="error-wrapper">
    <div class="error-card">
      <span class="error-code">404</span>
      <h1 class="error-title">Yolunu mu kaybettin?</h1>
      <p class="error-desc">
        Aradığın sayfa taşınmış veya hiç var olmamış olabilir. Merak etme, ana sayfaya dönerek kaldığın yerden devam edebilirsin.
      </p>
      <a href="index.html" class="btn-home">
        <svg class="svg-icon" viewBox="0 0 24 24" width="20" height="20" style="stroke: white;"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Ana Sayfaya Dön
      </a>
    </div>
  </div>
</body>
</html>
